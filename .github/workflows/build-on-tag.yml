name: Build Tools on Tag

on:
  push:
    tags:
      - 'launch/**'
      - 'filemgr/**'
      - 'structset/**'

jobs:
  extract_version:
    name: Extract Version Info
    runs-on: ubuntu-latest
    outputs:
      tool: ${{ steps.parse_tag.outputs.tool }}
      version: ${{ steps.parse_tag.outputs.version }}
    steps:
      - name: Parse tag
        id: parse_tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Processing tag: $TAG"

          # 解析工具名称和版本（格式: launch/v1.0.5）
          if [[ "$TAG" =~ ^launch/ ]]; then
            echo "tool=launch" >> $GITHUB_OUTPUT
            echo "version=${TAG#launch/}" >> $GITHUB_OUTPUT  # 去掉 launch/ 前缀
          elif [[ "$TAG" =~ ^filemgr/ ]]; then
            echo "tool=filemgr" >> $GITHUB_OUTPUT
            echo "version=${TAG#filemgr/}" >> $GITHUB_OUTPUT  # 去掉 filemgr/ 前缀
          elif [[ "$TAG" =~ ^structset/ ]]; then
            echo "tool=structset" >> $GITHUB_OUTPUT
            echo "version=${TAG#structset/}" >> $GITHUB_OUTPUT  # 去掉 structset/ 前缀
          else
            echo "Unknown tag format: $TAG"
            exit 1
          fi

          echo "Building tool: ${{ steps.parse_tag.outputs.tool }}"
          echo "Version: ${{ steps.parse_tag.outputs.version }}"

  build:
    name: Build ${{ needs.extract_version.outputs.tool }} for ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: extract_version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - os: ubuntu-latest
            goos: darwin
          - os: macos-latest
            goos: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # 禁用缓存，因为我们在子目录中构建

      - name: Download dependencies
        working-directory: ./${{ needs.extract_version.outputs.tool }}
        run: go mod download

      - name: Build ${{ matrix.tool }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        working-directory: ./${{ needs.extract_version.outputs.tool }}
        run: |
          OUTPUT_NAME="${{ needs.extract_version.outputs.tool }}-${{ matrix.goos }}-${{ matrix.goarch }}"

          # 构建并注入版本号
          go build \
            -ldflags="-s -w -X main.Version=${{ needs.extract_version.outputs.version }}" \
            -o "$OUTPUT_NAME" .

          # 设置可执行权限
          chmod +x "$OUTPUT_NAME"

          echo "Build complete: $OUTPUT_NAME (version: ${{ needs.extract_version.outputs.version }})"
          ls -l "$OUTPUT_NAME"

      - name: Copy binary to shared location
        run: |
          OUTPUT_NAME="${{ needs.extract_version.outputs.tool }}-${{ matrix.goos }}-${{ matrix.goarch }}"

          # 创建统一的 artifacts 目录（使用锁目录避免并发问题）
          mkdir -p artifacts

          # 从工具目录复制二进制文件
          cp ${{ needs.extract_version.outputs.tool }}/$OUTPUT_NAME artifacts/

          # 验证文件存在
          ls -la artifacts/
          echo "Copied: $OUTPUT_NAME"

          echo "BUILT_BINARY=$OUTPUT_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILT_BINARY }}
          path: artifacts/${{ env.BUILT_BINARY }}
          retention-days: 7
          if-no-files-found: error

  release:
    name: Create Release
    needs: [extract_version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded_artifacts

      - name: Prepare release files
        run: |
          # 创建扁平化的 release 目录
          mkdir -p ./artifacts

          # 找到所有二进制文件，设置权限并移动到 release 目录
          for dir in ./downloaded_artifacts/*/; do
            if [ -d "$dir" ]; then
              for file in "$dir"/*; do
                if [ -f "$file" ]; then
                  chmod +x "$file"
                  cp "$file" ./artifacts/
                  echo "Processed: $file"
                fi
              done
            fi
          done

          # 清理下载目录
          rm -rf ./downloaded_artifacts

          echo "Final artifacts structure:"
          ls -la ./artifacts/
          echo ""
          echo "Verifying executable permissions:"
          ls -l ./artifacts/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TOOL="${{ needs.extract_version.outputs.tool }}"

          # Use PAT if available, otherwise use GITHUB_TOKEN
          if [ -n "$MY_PAT" ]; then
            TOKEN="$MY_PAT"
          else
            TOKEN="$GITHUB_TOKEN"
          fi

          # 设置 Release 标题
          TITLE="$TOOL ${{ needs.extract_version.outputs.version }}"

          # 创建 Release
          gh release create "$TAG" \
            --title "$TITLE" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY" \
            ./artifacts/*

          echo "Release created: $TAG"
